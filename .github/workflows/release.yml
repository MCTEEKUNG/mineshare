# Build distributable installers for Windows + Linux on every
# tag push (e.g. `git tag v0.1.0 && git push --tags`). Each
# matrix leg builds on its native OS — Tauri can't cross-compile
# because each platform's WebView is a native lib.
#
# Outputs land in a draft GitHub Release attached to the tag.
# Code-signing is intentionally not configured here; the README
# walks users through SmartScreen / GPG verification by hand.
# When a cert appears, drop the relevant signing inputs into
# `tauri-action`'s `with:` block — no other changes needed.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
          - os: windows-latest
            label: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libopus-dev \
            pulseaudio-utils \
            pkg-config \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Cache Cargo + Tauri target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            ui/src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Build installers
        working-directory: ui
        run: bun run tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
              cp ui/src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
              cp ui/src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
              cp ui/src-tauri/target/release/bundle/rpm/*.rpm artifacts/ 2>/dev/null || true
          else
              cp ui/src-tauri/target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
              cp ui/src-tauri/target/release/bundle/nsis/*-setup.exe artifacts/ 2>/dev/null || true
          fi
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mineshare-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: error

      # Only run on tag pushes so workflow_dispatch builds don't
      # accidentally publish.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
