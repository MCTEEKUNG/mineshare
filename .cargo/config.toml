[env]
# audiopus_sys bundles libopus 1.3.1 whose CMakeLists.txt sets a
# `cmake_minimum_required` below the floor that modern CMake (>=4)
# now enforces. This env var tells CMake to fall back to the 3.5
# policy on configure so the bundled build keeps working without
# patching upstream.
CMAKE_POLICY_VERSION_MINIMUM = "3.5"
